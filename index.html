<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>🍌 AI 图片生成</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: flex-start;
            padding: 20px;
        }

        .container {
            background: white;
            border-radius: 16px;
            padding: 30px;
            max-width: 500px;
            width: 100%;
            margin-top: 30px;
            box-shadow: 0 20px 60px rgba(0,0,0,0.3);
        }

        h1 { font-size: 24px; margin-bottom: 6px; }
        .subtitle { color: #888; font-size: 14px; margin-bottom: 20px; }

        label {
            display: block;
            font-size: 14px;
            font-weight: 600;
            margin-bottom: 6px;
            color: #333;
        }

        input, textarea {
            width: 100%;
            padding: 12px;
            border: 2px solid #e0e0e0;
            border-radius: 8px;
            font-size: 14px;
            margin-bottom: 16px;
            transition: border-color 0.3s;
        }

        input:focus, textarea:focus {
            outline: none;
            border-color: #667eea;
        }

        textarea { resize: vertical; min-height: 80px; }

        button {
            width: 100%;
            padding: 14px;
            background: linear-gradient(135deg, #f093fb 0%, #f5576c 100%);
            color: white;
            border: none;
            border-radius: 8px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            transition: opacity 0.3s;
        }

        button:hover { opacity: 0.9; }
        button:disabled { opacity: 0.5; cursor: not-allowed; }

        .error {
            background: #fff0f0;
            color: #d32f2f;
            padding: 12px;
            border-radius: 8px;
            margin-top: 16px;
            font-size: 14px;
        }

        .text-result {
            background: #f5f5f5;
            padding: 14px;
            border-radius: 8px;
            margin-top: 16px;
            font-size: 14px;
            line-height: 1.6;
        }

        .image-box {
            margin-top: 16px;
            text-align: center;
        }

        .image-box img {
            max-width: 100%;
            border-radius: 12px;
            box-shadow: 0 4px 20px rgba(0,0,0,0.15);
        }

        .download-btn {
            display: inline-block;
            margin-top: 10px;
            padding: 8px 20px;
            background: #667eea;
            color: white;
            text-decoration: none;
            border-radius: 6px;
            font-size: 14px;
        }

        .hidden { display: none; }
    </style>
</head>
<body>
    <div class="container">
        <h1>🍌 AI 图片生成</h1>
        <p class="subtitle">输入描述，AI 为你生成高清图片</p>

        <label>🔑 访问令牌</label>
        <input type="password" id="token" placeholder="请输入您的访问令牌" />

        <label>✏️ 图片描述</label>
        <textarea id="prompt" placeholder="例如：一只穿宇航服的猫咪在月球上看地球"></textarea>

        <button id="btn" onclick="generate()">🎨 生成图片</button>

        <div id="error" class="error hidden"></div>
        <div id="textResult" class="text-result hidden"></div>
        <div id="imageBox" class="image-box hidden"></div>
    </div>

    <script>
        // ⚠️ 改成你的 Cloudflare Worker 地址
        const API_URL = "https://gemini-proxy.huangyuetian56.workers.dev";

        async function generate() {
            const token = document.getElementById("token").value.trim();
            const prompt = document.getElementById("prompt").value.trim();
            const btn = document.getElementById("btn");
            const errorDiv = document.getElementById("error");
            const textDiv = document.getElementById("textResult");
            const imageBox = document.getElementById("imageBox");

            // 隐藏之前的结果
            errorDiv.classList.add("hidden");
            textDiv.classList.add("hidden");
            imageBox.classList.add("hidden");

            if (!token) { showError("请输入访问令牌"); return; }
            if (!prompt) { showError("请输入图片描述"); return; }

            // 开始加载
            btn.disabled = true;
            btn.textContent = "⏳ 生成中，请稍候...";

            try {
                const res = await fetch(API_URL, {
                    method: "POST",
                    headers: {
                        "Content-Type": "application/json",
                        "Authorization": "Bearer " + token
                    },
                    body: JSON.stringify({ prompt: prompt })
                });

                const data = await res.json();

                if (data.error) {
                    showError(typeof data.error === "string" ? data.error : JSON.stringify(data.error));
                    return;
                }

                // 处理 Gemini 原始响应格式
                if (data.candidates) {
                    const parts = data.candidates[0].content.parts;
                    let hasImage = false;

                    for (const part of parts) {
                        if (part.text) {
                            textDiv.textContent = part.text;
                            textDiv.classList.remove("hidden");
                        }
                        if (part.inlineData) {
                            hasImage = true;
                            const src = "data:" + part.inlineData.mimeType + ";base64," + part.inlineData.data;
                            imageBox.innerHTML =
                                '<img src="' + src + '" alt="生成的图片" /><br>' +
                                '<a class="download-btn" href="' + src + '" download="ai-image.png">⬇️ 下载图片</a>';
                            imageBox.classList.remove("hidden");
                        }
                    }

                    if (!hasImage) {
                        // 纯文本响应（没有图片）
                        if (!textDiv.textContent) {
                            textDiv.textContent = "模型返回了内容，但没有图片。请尝试更具体的描述。";
                            textDiv.classList.remove("hidden");
                        }
                    }
                } else {
                    showError("未知的响应格式");
                }

            } catch (err) {
                showError("网络错误：" + err.message);
            } finally {
                btn.disabled = false;
                btn.textContent = "🎨 生成图片";
            }
        }

        function showError(msg) {
            const errorDiv = document.getElementById("error");
            errorDiv.textContent = "❌ " + msg;
            errorDiv.classList.remove("hidden");
        }

        // 回车键发送
        document.getElementById("prompt").addEventListener("keydown", function(e) {
            if (e.key === "Enter" && !e.shiftKey) {
                e.preventDefault();
                generate();
            }
        });
    </script>
</body>
</html>
