<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI 智能平台 - Gemini Pro/Ultra</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", "PingFang SC", "Microsoft YaHei", sans-serif;
            background: linear-gradient(135deg, #1a1a2e 0%, #16213e 50%, #0f3460 100%);
            min-height: 100vh;
            color: #333;
        }

        .header {
            background: rgba(255,255,255,0.05);
            backdrop-filter: blur(10px);
            padding: 16px 20px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-bottom: 1px solid rgba(255,255,255,0.1);
        }

        .logo { color: white; font-size: 20px; font-weight: 700; }
        .logo span { color: #f5576c; }

        .user-info {
            display: flex;
            align-items: center;
            gap: 10px;
            color: rgba(255,255,255,0.8);
            font-size: 14px;
        }

        .user-info .badge {
            background: linear-gradient(135deg, #f093fb, #f5576c);
            color: white;
            padding: 4px 10px;
            border-radius: 12px;
            font-size: 12px;
        }

        .main {
            max-width: 900px;
            margin: 0 auto;
            padding: 20px;
        }

        .tabs {
            display: flex;
            gap: 0;
            margin-bottom: 20px;
            background: rgba(255,255,255,0.1);
            border-radius: 12px;
            overflow: hidden;
        }

        .tab {
            flex: 1;
            padding: 14px;
            text-align: center;
            color: rgba(255,255,255,0.6);
            cursor: pointer;
            font-size: 14px;
            font-weight: 600;
            transition: all 0.3s;
        }

        .tab.active {
            background: linear-gradient(135deg, #f093fb, #f5576c);
            color: white;
        }

        .tab:hover:not(.active) { background: rgba(255,255,255,0.05); }

        .page { display: none; }
        .page.active { display: block; }

        .section-title {
            color: white;
            font-size: 18px;
            margin-bottom: 16px;
            padding-left: 12px;
            border-left: 3px solid #f5576c;
        }

        .plans-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 12px;
            margin-bottom: 30px;
        }

        .plan-card {
            background: rgba(255,255,255,0.95);
            border-radius: 12px;
            padding: 16px;
            cursor: pointer;
            transition: all 0.3s;
            border: 2px solid transparent;
            position: relative;
            overflow: hidden;
        }

        .plan-card:hover { transform: translateY(-2px); box-shadow: 0 8px 25px rgba(0,0,0,0.2); }
        .plan-card.selected { border-color: #f5576c; }

        .plan-card .tag {
            position: absolute;
            top: 0;
            right: 0;
            background: linear-gradient(135deg, #f093fb, #f5576c);
            color: white;
            font-size: 11px;
            padding: 3px 10px;
            border-radius: 0 10px 0 10px;
        }

        .plan-card .tag.hot { background: linear-gradient(135deg, #ff9a56, #ff6a00); }
        .plan-card .tag.recommend { background: linear-gradient(135deg, #43e97b, #38f9d7); color: #333; }

        .plan-name { font-size: 14px; font-weight: 600; color: #333; margin-bottom: 6px; }
        .plan-desc { font-size: 12px; color: #888; margin-bottom: 8px; }
        .plan-price { font-size: 22px; font-weight: 700; color: #f5576c; }

        .card {
            background: rgba(255,255,255,0.95);
            border-radius: 16px;
            padding: 24px;
            margin-bottom: 20px;
        }

        .card h3 { font-size: 16px; margin-bottom: 16px; color: #333; }

        label {
            display: block;
            font-size: 13px;
            font-weight: 600;
            margin-bottom: 6px;
            color: #555;
        }

        input, textarea, select {
            width: 100%;
            padding: 12px;
            border: 2px solid #e8e8e8;
            border-radius: 10px;
            font-size: 14px;
            margin-bottom: 14px;
            transition: border-color 0.3s;
            font-family: inherit;
        }

        input:focus, textarea:focus, select:focus { outline: none; border-color: #f5576c; }
        textarea { resize: vertical; min-height: 80px; }

        .btn-primary {
            width: 100%;
            padding: 14px;
            background: linear-gradient(135deg, #f093fb 0%, #f5576c 100%);
            color: white;
            border: none;
            border-radius: 10px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s;
        }

        .btn-primary:hover { opacity: 0.9; transform: translateY(-1px); }
        .btn-primary:disabled { opacity: 0.5; cursor: not-allowed; transform: none; }

        .btn-secondary {
            width: 100%;
            padding: 12px;
            background: #f0f0f0;
            color: #333;
            border: none;
            border-radius: 10px;
            font-size: 14px;
            cursor: pointer;
            margin-top: 10px;
        }

        .btn-secondary:hover { background: #e0e0e0; }

        .status-bar {
            background: rgba(255,255,255,0.1);
            border-radius: 12px;
            padding: 16px;
            margin-bottom: 20px;
            display: flex;
            justify-content: space-around;
            text-align: center;
        }

        .status-item { color: white; }
        .status-item .num { font-size: 24px; font-weight: 700; color: #43e97b; }
        .status-item .label { font-size: 12px; color: rgba(255,255,255,0.6); margin-top: 4px; }

        .error-box {
            background: #fff0f0;
            color: #d32f2f;
            padding: 14px;
            border-radius: 10px;
            margin-top: 16px;
            font-size: 14px;
        }

        .text-result {
            background: #f8f9fa;
            padding: 14px;
            border-radius: 10px;
            margin-top: 16px;
            font-size: 14px;
            line-height: 1.6;
        }

        .image-box { margin-top: 16px; text-align: center; }
        .image-box img { max-width: 100%; border-radius: 12px; box-shadow: 0 4px 20px rgba(0,0,0,0.15); }

        .download-btn {
            display: inline-block;
            margin-top: 10px;
            padding: 10px 24px;
            background: linear-gradient(135deg, #667eea, #764ba2);
            color: white;
            text-decoration: none;
            border-radius: 8px;
            font-size: 14px;
        }

        .hidden { display: none; }

        .modal-overlay {
            position: fixed;
            top: 0; left: 0; right: 0; bottom: 0;
            background: rgba(0,0,0,0.6);
            display: flex;
            justify-content: center;
            align-items: center;
            z-index: 1000;
        }

        .modal {
            background: white;
            border-radius: 16px;
            padding: 30px;
            max-width: 400px;
            width: 90%;
            text-align: center;
            position: relative;
        }

        .modal h3 { margin-bottom: 16px; font-size: 18px; }
        .modal p { color: #666; font-size: 14px; margin-bottom: 8px; }
        .modal .price-big { font-size: 36px; color: #f5576c; font-weight: 700; margin: 16px 0; }

        .modal .token-display {
            background: #f5f5f5;
            padding: 14px;
            border-radius: 8px;
            font-family: monospace;
            font-size: 16px;
            margin: 16px 0;
            word-break: break-all;
            user-select: all;
        }

        .copy-btn {
            padding: 10px 30px;
            background: linear-gradient(135deg, #43e97b, #38f9d7);
            border: none;
            border-radius: 8px;
            font-size: 14px;
            font-weight: 600;
            cursor: pointer;
            color: #333;
        }

        .close-x {
            position: absolute;
            top: 12px;
            right: 16px;
            width: 32px;
            height: 32px;
            background: #f0f0f0;
            border: none;
            border-radius: 50%;
            font-size: 18px;
            cursor: pointer;
            color: #666;
            display: flex;
            align-items: center;
            justify-content: center;
            line-height: 1;
        }

        .close-x:hover { background: #ddd; color: #333; }

        .history-item {
            background: #f8f9fa;
            border-radius: 10px;
            padding: 14px;
            margin-bottom: 10px;
            display: flex;
            gap: 12px;
            align-items: center;
        }

        .history-item img { width: 60px; height: 60px; border-radius: 8px; object-fit: cover; }
        .history-item .info { flex: 1; }
        .history-item .info .prompt-text { font-size: 13px; color: #333; }
        .history-item .info .time { font-size: 11px; color: #aaa; margin-top: 4px; }
